version: '3.8'
services:
  db:
    image: postgres:15
    container_name: fadel_db
    restart: always
    environment:
      POSTGRES_USER: user_fadel
      POSTGRES_PASSWORD: password_fadel
      POSTGRES_DB: fadel_delivery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: fadel_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: fadel_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://user_fadel:password_fadel@db:5432/fadel_delivery?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "votre_secret_super_securise"
    depends_on:
      - db
      - redis

volumes:
  postgres_data: